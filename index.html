<!DOCTYPE html>
<html>

<head>

  <title>Gauransh AI</title>

  <style>

    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    .chat-container{

      width:100%;
      max-width:700px;

      margin:auto;

      height:100vh;

      display:flex;
      flex-direction:column;
    }

    .header{

      background:#111827;

      padding:20px;

      text-align:center;

      font-size:24px;

      font-weight:bold;
    }

    .chat-box{

      flex:1;

      padding:20px;

      overflow-y:auto;
    }

    .message{

      padding:12px;

      margin-bottom:15px;

      border-radius:10px;

      max-width:80%;
    }

    .user{

      background:#2563eb;

      margin-left:auto;
    }

    .ai{

      background:#1e293b;
    }

    .input-area{

      display:flex;

      padding:15px;

      background:#111827;
    }

    input{

      flex:1;

      padding:12px;

      border:none;

      border-radius:10px;

      font-size:16px;
    }

    button{

      margin-left:10px;

      padding:12px 20px;

      border:none;

      border-radius:10px;

      background:#22c55e;

      color:white;

      font-size:16px;

      cursor:pointer;
    }

  </style>

</head>

<body>

  <div class="chat-container">

    <div class="header">
      🤖 Gauransh AI
    </div>

    <div
      class="chat-box"
      id="chatBox"
    ></div>

    <div class="input-area">

      <input
        type="text"
        id="message"
        placeholder="Type message..."
      >

      <button onclick="sendMessage()">
        Send
      </button>

    </div>

  </div>

  <script>

    async function sendMessage() {

      const input =
        document.getElementById("message");

      const message = input.value;

      if(message.trim() === "")
        return;

      const chatBox =
        document.getElementById("chatBox");

      chatBox.innerHTML += `
        <div class="message user">
          ${message}
        </div>
      `;

      input.value = "";

      chatBox.innerHTML += `
        <div class="message ai" id="loading">
          Typing...
        </div>
      `;

      chatBox.scrollTop =
        chatBox.scrollHeight;

      try {

        const response = await fetch(
          "http://localhost:3000/chat",
          {

            method:"POST",

            headers:{
              "Content-Type":"application/json"
            },

            body:JSON.stringify({
              message:message
            })

          }
        );

        const data =
          await response.json();

        document
          .getElementById("loading")
          .remove();

        chatBox.innerHTML += `
          <div class="message ai">
            ${data.reply || data.error}
          </div>
        `;

        chatBox.scrollTop =
          chatBox.scrollHeight;

      } catch(error){

        document
          .getElementById("loading")
          .remove();

        chatBox.innerHTML += `
          <div class="message ai">
            Server error
          </div>
        `;

      }

    }

    document
      .getElementById("message")
      .addEventListener(
        "keypress",
        function(event){

          if(event.key === "Enter"){
            sendMessage();
          }

        }
      );

  </script>

</body>
</html>
