<!DOCTYPE html>
<html>

<head>

  <title>Gauransh AI</title>

  <style>

    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    .chat-container{

      width:100%;
      max-width:700px;

      margin:auto;

      height:100vh;

      display:flex;
      flex-direction:column;
    }

    .header{

      background:#111827;

      padding:20px;

      text-align:center;

      font-size:24px;

      font-weight:bold;
    }

    .chat-box{

      flex:1;

      padding:20px;

      overflow-y:auto;
    }

    .message{

      padding:12px;

      margin-bottom:15px;

      border-radius:10px;

      max-width:80%;
    }

    .user{

      background:#2563eb;

      margin-left:auto;
    }

    .ai{

      background:#1e293b;
    }

    .input-area{

      display:flex;

      padding:15px;

      background:#111827;
    }

    input{

      flex:1;

      padding:12px;

      border:none;

      border-radius:10px;

      font-size:16px;
    }

    button{

      margin-left:10px;

      padding:12px 20px;

      border:none;

      border-radius:10px;

      background:#22c55e;

      color:white;

      font-size:16px;

      cursor:pointer;
    }

  </style>

</head>

<body>

  <div class="chat-container">

    <div class="header">
      🤖 Gauransh AI
    </div>

    <div
      class="chat-box"
      id="chatBox"
    ></div>

    <div class="input-area">

      <input
        type="text"
        id="message"
        placeholder="Type message..."
      >

  <button onclick="sendMessage()">
  Send
</button>

<button onclick="startVoice()">
  🎤
</button>
    </div>

  </div>

<script>

  function speakText(text){

    const speech =
      new SpeechSynthesisUtterance();

    speech.text = text;

    speech.lang = "hi-IN";

    speech.rate = 1;

    speech.pitch = 1;

    speech.volume = 1;

    window.speechSynthesis.speak(speech);

  }

  async function sendMessage() {

    const input =
      document.getElementById("message");

    const message = input.value;

    if(message.trim() === "")
      return;

    const chatBox =
      document.getElementById("chatBox");

    chatBox.innerHTML += `
      <div class="message user">
        ${message}
      </div>
    `;

    input.value = "";

    chatBox.innerHTML += `
      <div class="message ai" id="loading">
        Typing...
      </div>
    `;

    chatBox.scrollTop =
      chatBox.scrollHeight;

    try {

      const response = await fetch(
        "https://gauransh-ai.onrender.com/chat",
        {

          method:"POST",

          headers:{
            "Content-Type":"application/json"
          },

          body:JSON.stringify({
            message:message
          })

        }
      );

      const data =
        await response.json();

      document
        .getElementById("loading")
        .remove();

      chatBox.innerHTML += `
        <div class="message ai">
          ${data.reply || data.error}
        </div>
      `;

      speakText(
        data.reply || data.error
      );

      chatBox.scrollTop =
        chatBox.scrollHeight;

    } catch(error){

      document
        .getElementById("loading")
        .remove();

      chatBox.innerHTML += `
        <div class="message ai">
          Server error
        </div>
      `;

      speakText("Server error");

    }

  }

  document
    .getElementById("message")
    .addEventListener(
      "keypress",
      function(event){

        if(event.key === "Enter"){
          sendMessage();
        }

      }
    );

function startVoice(){

  const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

  const recognition =
    new SpeechRecognition();

  recognition.lang = "en-IN";

  recognition.start();

  recognition.onresult = function(event){

    const voiceText =
      event.results[0][0].transcript;

    document.getElementById("message").value =
      voiceText;

    sendMessage();

  };

}
</script>

</body>
</html>
